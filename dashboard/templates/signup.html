<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Lucid AI Trader</title>
  <link rel="stylesheet" href="/static/css/design-system.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99,102,241,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(168,85,247,.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 10%, rgba(59,130,246,.10) 0%, transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0%   { opacity: .7; }
      100% { opacity: 1; }
    }

    .auth-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      margin: var(--space-6, 24px);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px;
    }
    .auth-logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, rgba(99,102,241,.9), rgba(168,85,247,.9));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-logo-text { font-size: 18px; font-weight: 700; color: #fff; }

    .auth-title { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .auth-sub   { font-size: 14px; color: rgba(255,255,255,.5); margin-bottom: 32px; }

    .form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .form-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.55); letter-spacing: .04em; text-transform: uppercase; }
    .form-input {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s ease, background .2s ease;
      width: 100%;
    }
    .form-input::placeholder { color: rgba(255,255,255,.3); }
    .form-input:focus {
      border-color: rgba(99,102,241,.7);
      background: rgba(255,255,255,.10);
    }
    .form-hint { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 2px; }

    .error-banner {
      background: rgba(255,59,48,.12);
      border: 1px solid rgba(255,59,48,.3);
      border-radius: 10px;
      color: #ff6b6b;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 18px;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 12px; color: #fff;
      cursor: pointer; font-size: 15px; font-weight: 600;
      padding: 13px; margin-top: 6px;
      transition: opacity .2s ease, transform .15s ease;
    }
    .btn-primary:hover  { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }

    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,.4);
      margin-top: 24px;
    }
    .auth-footer a { color: rgba(99,102,241,.9); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .strength-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,.1); margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .3s ease, background .3s ease; }
  </style>
</head>
<body>
  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
          <path d="M9 2L14.196 5V11L9 14L3.804 11V5L9 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="9" cy="8.5" r="2.2" fill="white" opacity=".9"/>
        </svg>
      </div>
      <span class="auth-logo-text">Lucid AI</span>
    </div>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Choose an ID and password to get started.</p>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup" autocomplete="off">
      <div class="form-field">
        <label class="form-label" for="username">Your ID</label>
        <input
          class="form-input"
          id="username"
          name="username"
          type="text"
          placeholder="king$trader · lucid99 · @zero"
          value="{{ username or '' }}"
          autocomplete="off"
          required
          minlength="2"
          maxlength="64"
        />
        <span class="form-hint">Letters, numbers, and symbols — 2 to 64 characters</span>
      </div>

      <div class="form-field">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          id="password"
          name="password"
          type="password"
          placeholder="Min 6 characters"
          autocomplete="new-password"
          required
          minlength="6"
          oninput="updateStrength(this.value)"
        />
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>

      <div class="form-field">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input
          class="form-input"
          id="confirm_password"
          name="confirm_password"
          type="password"
          placeholder="Re-enter your password"
          autocomplete="new-password"
          required
          minlength="6"
        />
      </div>

      <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    function updateStrength(pw) {
      const fill = document.getElementById('strength-fill');
      let score = 0;
      if (pw.length >= 6)  score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/\d/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const pct = (score / 5) * 100;
      const color = score <= 1 ? '#ff3b30' : score <= 3 ? '#ff9f0a' : '#34c759';
      fill.style.width  = pct + '%';
      fill.style.background = color;
    }

    // Client-side confirm password check
    document.querySelector('form').addEventListener('submit', function(e) {
      const pw  = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      if (pw !== cpw) {
        e.preventDefault();
        alert('Passwords do not match.');
      }
    });
  </script>
</body>
</html>
